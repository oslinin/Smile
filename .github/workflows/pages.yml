name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/defi-options-marketplace-mvp-72wk65]
    paths: [frontend/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build static export
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /Smile
          NEXT_PUBLIC_WC_PROJECT_ID: ${{ vars.WC_PROJECT_ID }}
          NEXT_PUBLIC_UNISWAP_API_KEY: ${{ vars.UNISWAP_API_KEY }}
          NEXT_PUBLIC_PRICING_ENGINE: ${{ vars.PRICING_ENGINE_ADDRESS }}
          NEXT_PUBLIC_AQUA_VAULT: ${{ vars.AQUA_VAULT_ADDRESS }}
          NEXT_PUBLIC_SETTLEMENT: ${{ vars.SETTLEMENT_ADDRESS }}

      - name: Add .nojekyll
        run: touch frontend/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
